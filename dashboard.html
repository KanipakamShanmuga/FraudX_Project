<!DOCTYPE html>
<html>
<head>
    <title>FraudX Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>FraudX - Fraud Detection System</h1>

<input type="number" id="amount" placeholder="Enter Amount"><br><br>
<input type="text" id="location" placeholder="Enter Location"><br><br>

<button onclick="checkFraud()">Check Fraud</button>

<h2>Result</h2>
<p id="result"></p>

<!-- OTP Section -->
<div id="otpSection" style="display:none;">
    <h3>Enter OTP</h3>
    <input type="text" id="otpInput"><br><br>
    <p id="timerText">Time left: 30s</p>
    <button onclick="verifyOTP()">Verify OTP</button><br><br>
    <button onclick="resendOTP()" id="resendBtn" disabled>Resend OTP</button>
</div>

<h2>Transaction Dashboard</h2>
<table border="1">
<tr>
<th>ID</th>
<th>Amount</th>
<th>Risk</th>
<th>Status</th>
</tr>
<tbody id="tableData"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
